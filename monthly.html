<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月次カレンダー | ベルアージュ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;background:#F4F6F8;color:#333;font-size:12px}

/* ===== トップバー ===== */
.top-bar{
  background:#fff;
  border-bottom:1px solid #E8EAED;
  padding:0;
  display:flex;
  align-items:stretch;
  position:sticky;
  top:0;
  z-index:100;
  min-height:52px;
}
.top-bar-logo{
  background:#fff;
  padding:8px 16px;
  display:flex;align-items:center;
  border-right:1px solid #E8EAED;
  flex-shrink:0;
}
.top-bar-logo img{height:34px;object-fit:contain}
.top-bar-main{padding:0 16px;display:flex;align-items:center;gap:10px;flex:1;flex-wrap:wrap}
.top-bar-divider{width:1px;height:24px;background:#E8EAED}

/* 月ナビ */
.month-nav{display:flex;align-items:center;gap:6px}
.nav-btn{
  width:28px;height:28px;border-radius:6px;
  border:1px solid #E8EAED;background:#fff;
  color:#555;cursor:pointer;font-size:15px;
  display:flex;align-items:center;justify-content:center;
  transition:background .15s,border-color .15s;
}
.nav-btn:hover{background:#F4F6F8;border-color:#d0d3d8}
.month-label{font-size:14px;font-weight:600;color:#222;min-width:90px;text-align:center}

/* 凡例 */
.legend{display:flex;gap:12px;align-items:center;margin-left:auto;font-size:11px;color:#666}
.legend-item{display:flex;align-items:center;gap:5px}
.legend-dot{width:10px;height:10px;border-radius:3px;border:1px solid #E8EAED}

/* ナビボタン */
.nav-link{
  padding:5px 12px;border-radius:6px;
  border:1px solid #E8EAED;background:#fff;
  color:#555;font-size:12px;cursor:pointer;
  font-family:inherit;font-weight:500;
  transition:background .15s,border-color .15s,color .15s;
  white-space:nowrap;
}
.nav-link:hover{background:#F4F6F8;border-color:#d0d3d8;color:#333}

/* ===== コンテンツエリア ===== */
.content{padding:14px 16px;overflow-x:auto}

/* ===== カレンダーテーブル ===== */
.cal-wrap{min-width:max-content;background:#fff;border-radius:10px;border:1px solid #E8EAED;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.05)}
table{border-collapse:collapse;font-size:11px;width:100%}
th,td{border-right:1px solid #E8EAED;border-bottom:1px solid #E8EAED;padding:0;text-align:center;white-space:nowrap}
th:last-child,td:last-child{border-right:none}

/* ===== テーブルヘッダー ===== */
.th-office{
  background:#F8F9FA;color:#444;font-weight:600;font-size:11px;
  padding:8px 12px;min-width:132px;text-align:left;
  position:sticky;left:0;z-index:10;
  border-right:2px solid #E8EAED;
}
.th-date{
  background:#F8F9FA;color:#555;font-weight:500;font-size:10px;
  min-width:40px;padding:4px 2px;vertical-align:bottom;
}
.th-date .d-num{font-size:13px;font-weight:700;display:block;line-height:1.3;color:#333}
.th-date .d-dow{font-size:9px;display:block;line-height:1.5;color:#888}
.th-date.sun .d-num{color:#C0392B}
.th-date.sun .d-dow{color:#C0392B}
.th-date.sat .d-num{color:#2471A3}
.th-date.sat .d-dow{color:#2471A3}
.th-date.today{background:#F0FAF6}
.th-date.today .d-num{color:#1D9E75}
.th-summary{
  background:#F8F9FA;color:#444;font-weight:600;font-size:10px;
  padding:4px 6px;min-width:58px;
  border-left:2px solid #E8EAED;
}

/* ===== カテゴリ行 ===== */
.tr-cat td{
  background:#F0FAF6;
  color:#1D9E75;font-weight:700;font-size:11px;
  padding:5px 12px;text-align:left;
  border-bottom:1px solid #d4f4e8;
}
.tr-cat td.td-spacer{background:#F0FAF6;border-color:#d4f4e8}
.tr-cat td.td-sticky{position:sticky;left:0;z-index:5;border-right:2px solid #d4f4e8}

/* ===== エリア行 ===== */
.tr-area td{
  background:#FAFBFC;
  color:#888;font-weight:500;font-size:10px;
  padding:3px 12px 3px 20px;text-align:left;
  border-bottom:1px solid #EEEFF1;
}
.tr-area td.td-spacer{background:#FAFBFC;border-color:#EEEFF1}
.tr-area td.td-sticky{position:sticky;left:0;z-index:5;border-right:2px solid #EEEFF1}

/* ===== 事業所名セル ===== */
.td-office{
  background:#fff;color:#333;font-weight:500;font-size:11px;
  padding:3px 10px 3px 16px;text-align:left;
  position:sticky;left:0;z-index:5;
  min-width:132px;border-right:2px solid #E8EAED;
}

/* ===== データセル ===== */
.td-data{padding:0;min-width:40px;line-height:1}
.cell-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px 1px;min-height:15px}

/* 目標セル */
.td-goal{background:#F8FBFF}
.cell-goal{font-size:10px;color:#5B9BD5;font-weight:500}

/* 実績セル */
.td-actual{background:#FAFFFE}
.cell-actual{font-size:12px;font-weight:700;color:#1D9E75}
.cell-actual.under{color:#C0392B}
.cell-actual.none{color:#CCC;font-weight:400;font-size:10px}

/* 閉所セル */
.td-closed{background:#F8F9FA}
.cell-closed{font-size:9px;color:#CCC;letter-spacing:0}

/* 土日カラム */
.col-sun .td-goal{background:#FDF8F8}
.col-sun .td-actual{background:#FDF8F8}
.col-sat .td-goal{background:#F8FAFD}
.col-sat .td-actual{background:#F8FAFD}
.col-today .td-goal{background:#F5FDF9}
.col-today .td-actual{background:#F5FDF9}

/* ===== 合計列 ===== */
.td-sum{
  border-left:2px solid #E8EAED;
  background:#F8F9FA;
}
.td-sum-inner{padding:3px 6px;text-align:center}
.sum-label{font-size:9px;color:#999;display:block;line-height:1.4}
.sum-goal{font-size:11px;font-weight:600;color:#5B9BD5;display:block}
.sum-actual{font-size:12px;font-weight:700;color:#1D9E75;display:block}
.sum-actual.under{color:#C0392B}

/* ===== エリア合計行 ===== */
.tr-area-sum td{background:#F0F8FF;border-bottom:2px solid #D6E8F8}
.tr-area-sum .td-office{background:#F0F8FF;color:#2471A3;font-weight:600;border-right:2px solid #D6E8F8}
.tr-area-sum .td-sum{background:#E8F4FF;border-left:2px solid #D6E8F8}
.tr-area-sum .sum-goal{color:#2471A3}
.tr-area-sum .sum-actual{color:#1D6E3E}

/* ===== 事業部合計行 ===== */
.tr-cat-sum td{background:#F0FAF6;border-bottom:2px solid #B2DFDB}
.tr-cat-sum .td-office{background:#F0FAF6;color:#1D9E75;font-weight:700;border-right:2px solid #B2DFDB}
.tr-cat-sum .td-sum{background:#E0F5ED;border-left:2px solid #B2DFDB}
.tr-cat-sum .sum-goal{color:#1D9E75}
.tr-cat-sum .sum-actual{color:#0F6E56}

/* ===== ローディング ===== */
.loading{text-align:center;padding:60px;color:#aaa;font-size:14px}
</style>
</head>
<body>
<div class="top-bar">
  <div class="top-bar-logo">
    <img src="assets/belage_logo.png" alt="ベルアージュ" onerror="this.style.display='none'">
  </div>
  <div class="top-bar-main">
    <span class="top-bar-title">月次カレンダー</span>
    <div class="top-bar-divider"></div>
    <div class="month-nav">
      <button class="nav-btn" onclick="shiftMonth(-1)">‹</button>
      <span class="month-label" id="month-label">読込中...</span>
      <button class="nav-btn" onclick="shiftMonth(1)">›</button>
    </div>
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#F8FBFF"></div><span style="color:#5B9BD5">目標</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:#FAFFFE"></div><span style="color:#1D9E75">実績</span></div>
      <div class="legend-item"><div class="legend-dot" style="background:#F8F9FA"></div><span style="color:#aaa">閉所</span></div>
    </div>
    <div class="top-bar-divider"></div>
    <a href="daily.html" class="nav-link">速報入力</a>
    <a href="monthly.html" class="nav-link active">月次カレンダー</a>
    <a href="report.html" class="nav-link">実績表</a>
    <a href="import.html" class="nav-link">CSV取込</a>
    <a href="settings.html" class="nav-link">設定</a>
    <a href="index.html" class="nav-link">ポータル</a>
  </div>
</div>
<div class="content">
  <div id="cal-area"><div class="loading">データを読み込み中...</div></div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, getDoc, getDocs, query, where } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:"AIzaSyCl48Fay9AbMLRXJ7npya4PJIgDQPvltxs",
  authDomain:"daily-report-b90e8.firebaseapp.com",
  projectId:"daily-report-b90e8",
  storageBucket:"daily-report-b90e8.firebasestorage.app",
  messagingSenderId:"16569831525",
  appId:"1:16569831525:web:aa250f2061f762dfe1768c"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const OFFICES = [
  "HUGくみのいえ","ReadyGO井口","ReadyGO八木","ReadyGO川内","ここいろのいえ",
  "まなびあいのいえ","ReadyGO高屋","ReadyGO黒瀬","ぐらっちぇ黒瀬",
  "にじのいえ","はれのいえ",
  "ラフォーレ高陽","ラフォーレ亀山","レポ白木"
];
const LAFORE = ["ラフォーレ高陽","ラフォーレ亀山"];
const STRUCTURE = [
  { cat:"発達支援事業部", areas:[
    { label:"広島エリア",     offices:["HUGくみのいえ","ReadyGO井口","ReadyGO八木","ReadyGO川内","ここいろのいえ"] },
    { label:"東広島エリア",   offices:["まなびあいのいえ","ReadyGO高屋","ReadyGO黒瀬","ぐらっちぇ黒瀬"] },
    { label:"安芸エリア",     offices:["にじのいえ","はれのいえ"] }
  ]},
  { cat:"就労生活支援事業部", single:["ラフォーレ高陽","ラフォーレ亀山","レポ白木"] }
];

const DOW_JP = ['日','月','火','水','木','金','土'];
const now = new Date();
let viewYear  = now.getFullYear();
let viewMonth = now.getMonth() + 1; // 1-indexed

// -------- データキャッシュ --------
let capacities = {};   // office → capacity
let workdays   = {};   // office → { "YYYY-MM-DD": 0|1 }
let reports    = {};   // "YYYY-MM-DD" → { office → {kids, care, work} }

// -------- 初期化 --------
async function init() {
  // offices + prices 一括取得
  const [offSnap, prSnap] = await Promise.all([
    getDocs(collection(db, 'offices')),
    getDocs(collection(db, 'prices'))
  ]);
  const prices = {};
  prSnap.forEach(d => prices[d.id] = d.data());
  offSnap.forEach(d => {
    const o = d.data();
    const p = prices[o.priceId];
    if (p && p.capacity) capacities[o.name] = p.capacity;
  });
  await loadMonth();
}

// -------- 月データ読み込み --------
async function loadMonth() {
  const monthStr = `${viewYear}-${String(viewMonth).padStart(2,'0')}`;
  document.getElementById('month-label').textContent =
    `${viewYear}年${viewMonth}月`;
  document.getElementById('cal-area').innerHTML =
    '<div class="loading">データを読み込み中...</div>';

  const fiscalYear = viewMonth >= 4 ? viewYear : viewYear - 1;

  // 全事業所の稼働日を並列取得
  workdays = {};
  await Promise.all(OFFICES.map(async o => {
    try {
      const snap = await getDoc(doc(db, 'workdays', `${fiscalYear}_${o}`));
      workdays[o] = snap.exists() ? (snap.data().days || {}) : {};
    } catch { workdays[o] = {}; }
  }));

  // 速報データ取得
  reports = {};
  try {
    const q = query(collection(db, 'reports'), where('month', '==', monthStr));
    const snap = await getDocs(q);
    snap.forEach(d => {
      const r = d.data();
      const date = r.date;
      if (!reports[date]) reports[date] = {};
      if (!reports[date][r.office]) reports[date][r.office] = { kids: 0, care: null, work: null };
      const entry = reports[date][r.office];
      if (r.serviceType === 'care') { entry.care = r.kids; entry.kids += r.kids; }
      else if (r.serviceType === 'work') { entry.work = r.kids; entry.kids += r.kids; }
      else { entry.kids = r.kids; }
    });
  } catch (e) { console.error(e); }

  render(fiscalYear, viewYear, viewMonth, monthStr);
}

// -------- レンダリング --------
function render(fiscalYear, year, month, monthStr) {
  const daysInMonth = new Date(year, month, 0).getDate();
  const todayStr = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}-${String(new Date().getDate()).padStart(2,'0')}`;

  // 日付リスト
  const dates = [];
  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow = new Date(year, month-1, d).getDay();
    dates.push({ d, dateStr, dow });
  }

  // 目標・実績を事業所×日付で計算
  // goals[office][dateStr] = 定員（開所日のみ）
  // actuals[office][dateStr] = kids
  const goals   = {};
  const actuals = {};
  OFFICES.forEach(o => {
    goals[o]   = {};
    actuals[o] = {};
    const cap = capacities[o] || 10;
    const wd  = workdays[o] || {};
    dates.forEach(({ dateStr }) => {
      goals[o][dateStr]   = wd[dateStr] === 1 ? cap : null; // nullは閉所
      actuals[o][dateStr] = reports[dateStr]?.[o]?.kids ?? null;
    });
  });

  // HTML構築
  let html = '<div class="cal-wrap"><table>';

  // ===== ヘッダー行 =====
  html += '<thead><tr>';
  html += `<th class="th-office">事業所</th>`;
  dates.forEach(({ d, dateStr, dow }) => {
    const isToday = dateStr === todayStr;
    const dowCls  = dow === 0 ? 'sun' : dow === 6 ? 'sat' : '';
    const todayCls = isToday ? ' today' : '';
    html += `<th class="th-date ${dowCls}${todayCls}">
      <span class="d-num">${d}</span>
      <span class="d-dow">${DOW_JP[dow]}</span>
    </th>`;
  });
  html += `<th class="th-summary">月計<br><span style="font-size:9px;font-weight:400;color:#999">目標/実績</span></th>`;
  html += '</tr></thead>';

  // ===== ボディ =====
  html += '<tbody>';

  STRUCTURE.forEach(cat => {
    const catOffices = cat.areas
      ? cat.areas.flatMap(a => a.offices)
      : (cat.single || []);

    // カテゴリ行
    html += `<tr class="tr-cat">`;
    html += `<td class="td-sticky" style="position:sticky;left:0;z-index:5;border-right:2px solid #d4f4e8;background:#F0FAF6;color:#1D9E75;font-weight:700;font-size:11px;padding:5px 12px;text-align:left">${cat.cat}</td>`;
    dates.forEach(() => { html += `<td class="td-spacer"></td>`; });
    html += `<td class="td-spacer" style="border-left:2px solid #d4f4e8"></td></tr>`;

    // エリア or single
    if (cat.areas) {
      cat.areas.forEach(area => {
        // エリアラベル行
        html += `<tr class="tr-area">`;
        html += `<td class="td-sticky" style="position:sticky;left:0;z-index:5;border-right:2px solid #EEEFF1;background:#FAFBFC;color:#999;font-weight:500;font-size:10px;padding:3px 12px 3px 20px;text-align:left">▸ ${area.label}</td>`;
        dates.forEach(() => { html += `<td class="td-spacer"></td>`; });
        html += `<td class="td-spacer" style="border-left:2px solid #EEEFF1"></td></tr>`;

        // 各事業所
        area.offices.forEach(o => {
          html += officeRows(o, dates, goals, actuals, todayStr);
        });

        // エリア合計行
        html += areaSum(area.offices, dates, goals, actuals, area.label, todayStr);
      });
    } else {
      cat.single.forEach(o => {
        html += officeRows(o, dates, goals, actuals, todayStr);
      });
    }

    // 事業部合計行
    html += catSum(catOffices, dates, goals, actuals, cat.cat, todayStr);
  });

  html += '</tbody></table></div>';
  document.getElementById('cal-area').innerHTML = html;
}

// -------- 事業所行（目標・実績2行）--------
function officeRows(o, dates, goals, actuals, todayStr) {
  let html = '';
  // === 目標行 ===
  html += `<tr>`;
  html += `<td class="td-office" rowspan="2" style="vertical-align:middle">${o}</td>`;

  let monthGoal = 0;
  dates.forEach(({ dateStr, dow }) => {
    const g = goals[o][dateStr];
    const isToday = dateStr === todayStr;
    const isSun = dow === 0, isSat = dow === 6;
    const colBg = isToday ? '#F0FDF8' : isSun ? '#FDF8F8' : isSat ? '#F8FAFD' : '';

    if (g === null) {
      // 閉所：2行まとめてrowspan
      html += `<td class="td-data td-closed" rowspan="2" style="${colBg?'background:'+colBg:'background:#F8F9FA'}">
        <div class="cell-inner"><span class="cell-closed">閉</span></div>
      </td>`;
      return;
    }
    monthGoal += g;
    html += `<td class="td-data td-goal" style="${colBg?'background:'+colBg:''}">
      <div class="cell-inner"><span class="cell-goal">${g}</span></div>
    </td>`;
  });

  // 月計セル（2行またぎ）
  html += `<td class="td-sum" rowspan="2" style="vertical-align:middle">
    <div class="td-sum-inner">
      <span class="sum-label">目標</span>
      <span class="sum-goal">${monthGoal || '—'}</span>
    </div>
  </td>`;
  html += `</tr>`;

  // === 実績行 ===
  html += `<tr>`;
  let monthActual = 0;
  dates.forEach(({ dateStr, dow }) => {
    const g = goals[o][dateStr];
    if (g === null) return; // 閉所はrowspan済みスキップ
    const a = actuals[o][dateStr];
    const isToday = dateStr === todayStr;
    const isSun = dow === 0, isSat = dow === 6;
    const colBg = isToday ? '#F0FDF8' : isSun ? '#FDF8F8' : isSat ? '#F8FAFD' : '#FAFFFE';

    if (a !== null) {
      monthActual += a;
      const cls = a < g ? 'under' : '';
      html += `<td class="td-data td-actual" style="background:${colBg}">
        <div class="cell-inner"><span class="cell-actual ${cls}">${a}</span></div>
      </td>`;
    } else {
      const d = new Date(dateStr);
      const today = new Date(todayStr);
      const isPast = d < today;
      html += `<td class="td-data td-actual" style="background:${colBg}">
        <div class="cell-inner"><span class="cell-actual none">${isPast ? '—' : ''}</span></div>
      </td>`;
    }
  });
  html += `</tr>`;

  // 月計実績を月計セルに埋め込む（rowspan後なのでDOMで更新が難しいため月計行を別に追加する必要なし）
  return html;
}

// -------- エリア合計行 --------
function areaSum(offices, dates, goals, actuals, label, todayStr) {
  let html = `<tr class="tr-area-sum">`;
  html += `<td class="td-office" style="color:#2471A3;font-weight:600;padding-left:12px;border-right:2px solid #D6E8F8">▸ ${label}　合計</td>`;

  let mGoal = 0, mActual = 0, hasActual = false;
  dates.forEach(({ dateStr, dow }) => {
    const dayGoal   = offices.reduce((s, o) => s + (goals[o][dateStr] ?? 0), 0);
    const dayActual = offices.reduce((s, o) => s + (actuals[o][dateStr] ?? 0), 0);
    const anyOpen   = offices.some(o => goals[o][dateStr] !== null);
    const anyActual = offices.some(o => actuals[o][dateStr] !== null);
    const isToday = dateStr === todayStr;
    const isSun = dow === 0, isSat = dow === 6;
    const colBg = isToday ? '#E8F8F2' : isSun ? '#F5ECEC' : isSat ? '#EEF2F8' : '';

    if (!anyOpen) {
      html += `<td style="background:#F0F0F2;border-right:1px solid #E8EAED"><div class="cell-inner"><span style="font-size:9px;color:#CCC">閉</span></div></td>`;
      return;
    }
    mGoal += dayGoal;
    if (anyActual) { mActual += dayActual; hasActual = true; }
    const pctCls = anyActual && dayGoal > 0 && dayActual < dayGoal ? 'color:#C0392B' : 'color:#1D6E3E';
    html += `<td style="${colBg?'background:'+colBg+';':''}border-right:1px solid #E8EAED;text-align:center;padding:1px 2px">
      <span style="font-size:10px;color:#5B9BD5;font-weight:500;display:block">${dayGoal}</span>
      <span style="font-size:11px;font-weight:700;display:block;${anyActual?pctCls:'color:#CCC'}">${anyActual ? dayActual : '—'}</span>
    </td>`;
  });

  html += `<td class="td-sum" style="border-left:2px solid #D6E8F8;background:#E8F4FF">
    <div class="td-sum-inner">
      <span class="sum-label">目標</span><span class="sum-goal" style="color:#2471A3">${mGoal}</span>
      <span class="sum-label" style="margin-top:2px">実績</span>
      <span class="sum-actual ${hasActual && mActual < mGoal ? 'under' : ''}">${hasActual ? mActual : '—'}</span>
    </div>
  </td>`;
  html += `</tr>`;
  return html;
}

// -------- 事業部合計行 --------
function catSum(offices, dates, goals, actuals, label, todayStr) {
  let html = `<tr class="tr-cat-sum">`;
  html += `<td class="td-office" style="color:#1D9E75;font-weight:700;border-right:2px solid #B2DFDB">${label}　計</td>`;

  let mGoal = 0, mActual = 0, hasActual = false;
  dates.forEach(({ dateStr, dow }) => {
    const dayGoal   = offices.reduce((s, o) => s + (goals[o][dateStr] ?? 0), 0);
    const dayActual = offices.reduce((s, o) => s + (actuals[o][dateStr] ?? 0), 0);
    const anyOpen   = offices.some(o => goals[o][dateStr] !== null);
    const anyActual = offices.some(o => actuals[o][dateStr] !== null);
    const isToday = dateStr === todayStr;
    const isSun = dow === 0, isSat = dow === 6;
    const colBg = isToday ? '#E0F5EC' : isSun ? '#EFF6F0' : isSat ? '#EFF3F6' : '';

    if (!anyOpen) {
      html += `<td style="background:#F2F5F2;border-right:1px solid #d4f4e8"></td>`;
      return;
    }
    mGoal += dayGoal;
    if (anyActual) { mActual += dayActual; hasActual = true; }
    const pctCls = anyActual && dayGoal > 0 && dayActual < dayGoal ? 'color:#C0392B' : 'color:#0F6E56';
    html += `<td style="${colBg?'background:'+colBg+';':''}border-right:1px solid #d4f4e8;text-align:center;padding:1px 2px">
      <span style="font-size:10px;color:#1D9E75;font-weight:500;display:block">${dayGoal}</span>
      <span style="font-size:11px;font-weight:700;display:block;${anyActual?pctCls:'color:#CCC'}">${anyActual ? dayActual : '—'}</span>
    </td>`;
  });

  html += `<td class="td-sum" style="border-left:2px solid #B2DFDB;background:#E0F5ED">
    <div class="td-sum-inner">
      <span class="sum-label">目標</span><span class="sum-goal" style="color:#1D9E75">${mGoal}</span>
      <span class="sum-label" style="margin-top:2px">実績</span>
      <span class="sum-actual ${hasActual && mActual < mGoal ? 'under' : ''}">${hasActual ? mActual : '—'}</span>
    </div>
  </td>`;
  html += `</tr>`;
  return html;
}

// -------- 月移動 --------
window.shiftMonth = function(dir) {
  viewMonth += dir;
  if (viewMonth > 12) { viewMonth = 1;  viewYear++; }
  if (viewMonth < 1)  { viewMonth = 12; viewYear--; }
  loadMonth();
};
