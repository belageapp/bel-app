<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>初期設定 | 貢献人数速報</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#f0f2f5;min-height:100vh;color:#333}
.layout{display:flex;min-height:100vh}
/* サイドバー */
.sidebar{width:200px;background:#1D9E75;flex-shrink:0;padding:0;position:sticky;top:0;height:100vh}
.sidebar-title{padding:20px 16px 16px;color:#fff;font-size:15px;font-weight:600;border-bottom:1px solid rgba(255,255,255,0.2)}
.sidebar-subtitle{font-size:11px;opacity:0.7;font-weight:400;display:block;margin-top:2px}
.nav-item{display:block;padding:12px 16px;color:rgba(255,255,255,0.85);font-size:13px;cursor:pointer;border:none;background:none;width:100%;text-align:left;border-left:3px solid transparent;transition:all 0.15s}
.nav-item:hover{background:rgba(255,255,255,0.1);color:#fff}
.nav-item.active{background:rgba(255,255,255,0.15);color:#fff;border-left-color:#fff;font-weight:500}
.nav-section{padding:12px 16px 4px;font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:0.5px;text-transform:uppercase}
.back-link{display:block;padding:12px 16px;color:rgba(255,255,255,0.6);font-size:12px;cursor:pointer;border:none;background:none;width:100%;text-align:left;margin-top:auto;border-top:1px solid rgba(255,255,255,0.15);position:absolute;bottom:0;width:200px}
.back-link:hover{color:#fff}
/* メインコンテンツ */
.main{flex:1;padding:28px 32px;overflow-y:auto}
.page{display:none}.page.active{display:block}
.page-header{margin-bottom:24px}
.page-title{font-size:20px;font-weight:600;color:#1D9E75;margin-bottom:4px}
.page-desc{font-size:13px;color:#888}
/* カード */
.card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,0.08);margin-bottom:20px;overflow:hidden}
.card-header{padding:14px 20px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.card-title{font-size:14px;font-weight:600;color:#333}
.card-body{padding:20px}
/* テーブル */
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{text-align:left;padding:9px 14px;background:#f8f8f8;color:#666;font-weight:500;border-bottom:1px solid #e8e8e8;white-space:nowrap}
.data-table td{padding:10px 14px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:#fafafa}
/* フォーム */
.form-row{display:flex;gap:12px;align-items:flex-end;margin-bottom:12px;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;color:#666;font-weight:500}
.form-group input,.form-group select{padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;font-family:inherit;outline:none;background:#fff;color:#333}
.form-group input:focus,.form-group select:focus{border-color:#1D9E75}
.form-group input[type="number"]{width:100px}
/* ボタン */
.btn{padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;border:none;font-family:inherit;font-weight:500}
.btn-primary{background:#1D9E75;color:#fff}.btn-primary:hover{background:#0F6E56}
.btn-secondary{background:#f0f0f0;color:#555;border:1px solid #ddd}.btn-secondary:hover{background:#e8e8e8}
.btn-danger{background:#fff;color:#E24B4A;border:1px solid #E24B4A}.btn-danger:hover{background:#fff0f0}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-blue{background:#185FA5;color:#fff}.btn-blue:hover{background:#0C447C}
/* バッジ */
.badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:500}
.badge-green{background:#d4f4e8;color:#0F6E56}
.badge-blue{background:#ddeef9;color:#185FA5}
.badge-gray{background:#f0f0f0;color:#666}
/* ステータス */
.status-bar{background:#d4f4e8;color:#0F6E56;font-size:12px;padding:8px 14px;border-radius:6px;margin-bottom:14px;display:none}
.error-bar{background:#fdecea;color:#A32D2D;font-size:12px;padding:8px 14px;border-radius:6px;margin-bottom:14px;display:none}
/* 空状態 */
.empty{text-align:center;padding:32px;color:#aaa;font-size:13px}
/* 単価テーブル特別スタイル */
.price-input{width:120px;padding:6px 8px;border:1px solid #ddd;border-radius:5px;font-size:13px;font-family:inherit;text-align:right}
.price-input:focus{outline:none;border-color:#1D9E75}
.capacity-badge{display:inline-block;background:#EBF3FB;color:#185FA5;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:500}
/* 事業所テーブル */
.office-price-select{padding:6px 8px;border:1px solid #ddd;border-radius:5px;font-size:12px;font-family:inherit;max-width:180px}
.office-price-select:focus{outline:none;border-color:#1D9E75}
.derived-price{font-size:12px;color:#1D9E75;font-weight:500;min-width:80px;display:inline-block}

/* カレンダー 修正版 */
.cal-month{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,0.08);overflow:hidden;min-width:0;display:flex;flex-direction:column}
.cal-month-title{background:#185FA5;color:#fff;font-size:12px;font-weight:600;padding:7px 12px;display:flex;justify-content:space-between;align-items:center}
.cal-month-count{font-size:11px;opacity:0.85}
.cal-grid{display:grid;grid-template-columns:repeat(7, 1fr);gap:2px;padding:8px}
.cal-dow{font-size:10px;color:#aaa;text-align:center;padding:4px 0;font-weight:500;min-width:0}
.cal-dow.sun{color:#E24B4A}
.cal-dow.sat{color:#185FA5}
.cal-day{width:100%;height:32px;border-radius:4px;border:1px solid transparent;cursor:pointer;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;transition:all 0.1s;min-width:0;box-sizing:border-box}
.cal-day.on{background:#1D9E75;color:#fff;border-color:#0F6E56}
.cal-day.off{background:#f0f0f0;color:#bbb;border-color:#e0e0e0}
.cal-day.off.sun{background:#FFF0E0;color:#CC6600;border-color:#FFDBB0}
.cal-day.off.sat{background:#EBF3FB;color:#185FA5;border-color:#B5D4F4}
.cal-day.empty{background:transparent;cursor:default;border:none;height:32px;pointer-events:none}
.cal-day:not(.empty):hover{opacity:0.8;transform:scale(0.95)}
</style>
</head>
<body>
<div class="layout">
  <div class="sidebar">
    <div class="sidebar-title">初期設定<span class="sidebar-subtitle">貢献人数速報</span></div>
    <div class="nav-section">マスタ設定</div>
    <button class="nav-item active" onclick="showPage('service-types',this)">施設種別</button>
    <button class="nav-item" onclick="showPage('prices',this)">単価設定</button>
    <button class="nav-item" onclick="showPage('departments',this)">部署</button>
    <button class="nav-item" onclick="showPage('areas',this)">エリア</button>
    <button class="nav-item" onclick="showPage('offices',this)">事業所登録</button>
    <div class="nav-section">年度設定</div>
    <button class="nav-item" onclick="showPage('workdays',this)">稼働日設定</button>
    <button class="back-link" onclick="location.href='index.html'">← アプリに戻る</button>
  </div>

  <div class="main">
    <div class="status-bar" id="status-bar"></div>
    <div class="error-bar" id="error-bar"></div>

    <div class="page active" id="page-service-types">
      <div class="page-header">
        <div class="page-title">施設種別</div>
        <div class="page-desc">事業所の種別を管理します。</div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">種別一覧</span></div>
        <div class="card-body">
          <div class="form-row" style="margin-bottom:16px">
            <div class="form-group">
              <label>新しい種別名</label>
              <input type="text" id="new-type-name" placeholder="例：放デイ" style="width:160px" maxlength="10">
            </div>
            <button class="btn btn-primary" onclick="addServiceType()">追加</button>
          </div>
          <table class="data-table">
            <thead><tr><th>種別名</th><th>登録日</th><th>操作</th></tr></thead>
            <tbody id="type-tbody"><tr><td colspan="3" class="empty">読み込み中...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="page" id="page-prices">
      <div class="page-header">
        <div class="page-title">単価設定</div>
        <div class="page-desc">施設種別と定員の組み合わせで単価を設定します。</div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">単価一覧</span></div>
        <div class="card-body">
          <table class="data-table">
            <thead><tr><th>施設種別</th><th>定員</th><th>単価（円）</th><th></th><th>操作</th></tr></thead>
            <tbody id="price-tbody"><tr><td colspan="5" class="empty">読み込み中...</td></tr></tbody>
          </table>
          <div style="margin-top:16px;padding-top:16px;border-top:1px solid #f0f0f0">
            <div class="form-row">
              <div class="form-group"><label>施設種別</label><select id="new-price-type" style="width:120px"></select></div>
              <div class="form-group"><label>定員</label><input type="number" id="new-price-capacity" placeholder="10"></div>
              <div class="form-group"><label>単価（円）</label><input type="number" id="new-price-value" placeholder="12400" style="width:120px"></div>
              <button class="btn btn-blue" onclick="addPrice()">追加</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="page" id="page-departments">
      <div class="page-header">
        <div class="page-title">部署</div>
        <div class="page-desc">事業所が所属する部署を管理します。</div>
      </div>
      <div class="card">
        <div class="card-header"><span class="card-title">部署一覧</span></div>
        <div class="card-body">
          <div class="form-row" style="margin-bottom:16px">
            <div class="form-group"><label>新しい部署名</label><input type="text" id="new-dept-name" placeholder="例：発達支援事業部" style="width:220px"></div>
            <button class="btn btn-primary" onclick="addDepartment()">追加</button>
          </div>
          <table class="data-table">
            <thead><tr><th>部署名</th><th>事業所数</th><th>登録日</th><th>操作</th></tr></thead>
            <tbody id="dept-tbody"><tr><td colspan="4" class="empty">読み込み中...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="page" id="page-areas">
      <div class="page-header"><div class="page-title">エリア</div></div>
      <div class="card">
        <div class="card-header"><span class="card-title">エリア一覧</span></div>
        <div class="card-body">
          <div class="form-row" style="margin-bottom:16px">
            <div class="form-group"><label>新しいエリア名</label><input type="text" id="new-area-name" placeholder="例：広島エリア" style="width:200px"></div>
            <button class="btn btn-primary" onclick="addArea()">追加</button>
          </div>
          <table class="data-table">
            <thead><tr><th>エリア名</th><th>事業所数</th><th>登録日</th><th>操作</th></tr></thead>
            <tbody id="area-tbody"><tr><td colspan="4" class="empty">読み込み中...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="page" id="page-offices">
      <div class="page-header"><div class="page-title">事業所登録</div></div>
      <div class="card">
        <div class="card-header"><span class="card-title">事業所一覧</span><button class="btn btn-primary btn-sm" onclick="saveOffices()">変更を保存</button></div>
        <div class="card-body">
          <table class="data-table">
            <thead><tr><th>事業所名</th><th>部署</th><th>エリア</th><th>単価設定</th><th>単価</th></tr></thead>
            <tbody id="office-tbody"><tr><td colspan="5" class="empty">読み込み中...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>

    <div class="page" id="page-workdays">
      <div class="page-header">
        <div class="page-title">稼働日設定</div>
        <div class="page-desc">年度・事業所を選択して稼働日をクリックで設定してください。日曜は初期値OFF、それ以外はONです。</div>
      </div>
      <div class="card" style="padding:14px 20px">
        <div style="display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap">
          <div class="form-group">
            <label>年度</label>
            <select id="wd-year" style="width:120px" onchange="loadWorkdays()">
              <option value="2025">2025年度</option>
              <option value="2026" selected>2026年度</option>
              <option value="2027">2027年度</option>
            </select>
          </div>
          <div class="form-group">
            <label>事業所</label>
            <select id="wd-office" style="width:180px" onchange="loadWorkdays()"></select>
          </div>
          <button class="btn btn-primary" onclick="saveWorkdays()" id="wd-save-btn">保存する</button>
          <button class="btn btn-secondary" onclick="initWorkdays()">初期値に戻す</button>
          <span id="wd-status" style="font-size:12px;color:#1D9E75"></span>
        </div>
      </div>
      <div id="wd-calendar" style="display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px;margin-top:4px;align-items:start"></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, getDoc, setDoc, addDoc, getDocs, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCl48Fay9AbMLRXJ7npya4PJIgDQPvltxs",
  authDomain: "daily-report-b90e8.firebaseapp.com",
  projectId: "daily-report-b90e8",
  storageBucket: "daily-report-b90e8.firebasestorage.app",
  messagingSenderId: "16569831525",
  appId: "1:16569831525:web:aa250f2061f762dfe1768c"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cache = {types:[], prices:[], depts:[], areas:[], offices:[]};
let wdData = {};

function showStatus(msg, isErr=false){
  const el = document.getElementById(isErr?'error-bar':'status-bar');
  el.textContent=msg; el.style.display='block';
  setTimeout(()=>el.style.display='none', 3000);
}

window.showPage = function(id, el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  if(el) el.classList.add('active');
  if(id==='prices') renderPriceTypeSelect();
  if(id==='offices') renderOfficeTable();
  if(id==='workdays'){initWdOfficeSelect();loadWorkdays();}
};

// マスタ読み込み等（中略：ロジックは保持）
async function loadTypes(){
  const snap = await getDocs(collection(db,'serviceTypes'));
  cache.types = []; snap.forEach(d=>cache.types.push({id:d.id,...d.data()}));
  cache.types.sort((a,b)=>(a.order||99)-(b.order||99)); renderTypes();
}
function renderTypes(){
  const tb = document.getElementById('type-tbody');
  tb.innerHTML = cache.types.map(t=>`<tr><td><span class="badge badge-green">${t.name}</span></td><td style="color:#aaa;font-size:12px">${t.createdAt?t.createdAt.substring(0,10):''}</td><td><button class="btn btn-danger btn-sm" onclick="deleteType('${t.id}','${t.name}')">削除</button></td></tr>`).join('');
}
window.addServiceType = async function(){
  const name = document.getElementById('new-type-name').value.trim();
  if(!name) return;
  await addDoc(collection(db,'serviceTypes'),{name, createdAt: new Date().toISOString()});
  document.getElementById('new-type-name').value=''; await loadTypes();
};

async function loadPrices(){
  const snap = await getDocs(collection(db,'prices'));
  cache.prices = []; snap.forEach(d=>cache.prices.push({id:d.id,...d.data()}));
  renderPrices();
}
function renderPrices(){
  const tb = document.getElementById('price-tbody');
  tb.innerHTML = cache.prices.map(p=>`<tr><td><span class="badge badge-blue">${p.type}</span></td><td>${p.capacity>0?`<span class="capacity-badge">定員${p.capacity}</span>`:'なし'}</td><td><input type="number" class="price-input" id="price-${p.id}" value="${p.price||''}"></td><td><button class="btn btn-primary btn-sm" onclick="saveOnePrice('${p.id}')">保存</button></td><td><button class="btn btn-danger btn-sm" onclick="deletePrice('${p.id}')">削除</button></td></tr>`).join('');
}
function renderPriceTypeSelect(){
  const sel = document.getElementById('new-price-type');
  sel.innerHTML = cache.types.map(t=>`<option value="${t.name}">${t.name}</option>`).join('');
}
window.saveOnePrice = async function(id){
  const p = cache.prices.find(x=>x.id===id);
  const v = document.getElementById(`price-${id}`).value;
  await setDoc(doc(db,'prices',id),{...p, price: v?parseInt(v):null});
  showStatus('保存しました');
};
window.addPrice = async function(){
  const type = document.getElementById('new-price-type').value;
  const cap = parseInt(document.getElementById('new-price-capacity').value)||0;
  const price = document.getElementById('new-price-value').value;
  await addDoc(collection(db,'prices'),{type, capacity:cap, price:price?parseInt(price):null, createdAt:new Date().toISOString()});
  await loadPrices();
};

async function loadDepts(){
  const snap = await getDocs(collection(db,'departments'));
  cache.depts = []; snap.forEach(d=>cache.depts.push({id:d.id,...d.data()}));
  renderDepts();
}
function renderDepts(){
  const tb = document.getElementById('dept-tbody');
  tb.innerHTML = cache.depts.map(d=>`<tr><td>${d.name}</td><td>${cache.offices.filter(o=>o.dept===d.name).length}</td><td>${d.createdAt?.substring(0,10)}</td><td><button class="btn btn-danger btn-sm" onclick="deleteDept('${d.id}')">削除</button></td></tr>`).join('');
}
window.addDepartment = async function(){
  const name = document.getElementById('new-dept-name').value.trim();
  if(!name) return;
  await addDoc(collection(db,'departments'),{name, createdAt:new Date().toISOString()});
  await loadDepts();
};

async function loadAreas(){
  const snap = await getDocs(collection(db,'areas'));
  cache.areas = []; snap.forEach(d=>cache.areas.push({id:d.id,...d.data()}));
  renderAreas();
}
function renderAreas(){
  const tb = document.getElementById('area-tbody');
  tb.innerHTML = cache.areas.map(a=>`<tr><td>${a.name}</td><td>${cache.offices.filter(o=>o.area===a.name).length}</td><td>${a.createdAt?.substring(0,10)}</td><td><button class="btn btn-danger btn-sm" onclick="deleteArea('${a.id}')">削除</button></td></tr>`).join('');
}
window.addArea = async function(){
  const name = document.getElementById('new-area-name').value.trim();
  if(!name) return;
  await addDoc(collection(db,'areas'),{name, createdAt:new Date().toISOString()});
  await loadAreas();
};

async function loadOffices(){
  const snap = await getDocs(collection(db,'offices'));
  cache.offices = []; snap.forEach(d=>cache.offices.push({id:d.id,...d.data()}));
  cache.offices.sort((a,b)=>(a.order||99)-(b.order||99));
}
function renderOfficeTable(){
  const tb = document.getElementById('office-tbody');
  tb.innerHTML = cache.offices.map(o=>`
    <tr>
      <td>${o.name}</td>
      <td><select class="office-price-select" onchange="updateOfficeDept('${o.id}',this.value)">${cache.depts.map(d=>`<option value="${d.name}"${o.dept===d.name?' selected':''}>${d.name}</option>`).join('')}</select></td>
      <td><select class="office-price-select" onchange="updateOfficeArea('${o.id}',this.value)"><option value="">未設定</option>${cache.areas.map(a=>`<option value="${a.name}"${o.area===a.name?' selected':''}>${a.name}</option>`).join('')}</select></td>
      <td><select class="office-price-select" onchange="updateOfficePrice('${o.id}',this.value)"><option value="">未設定</option>${cache.prices.map(p=>`<option value="${p.id}"${o.priceId===p.id?' selected':''}>${p.type}${p.capacity>0?' 定員'+p.capacity:''}</option>`).join('')}</select></td>
      <td><span id="derived-${o.id}">${o.price?o.price.toLocaleString()+'円':'—'}</span></td>
    </tr>`).join('');
}
window.updateOfficeDept = (id,v) => { const o=cache.offices.find(x=>x.id===id); if(o) o.dept=v; };
window.updateOfficeArea = (id,v) => { const o=cache.offices.find(x=>x.id===id); if(o) o.area=v; };
window.updateOfficePrice = (id,pid) => {
  const o=cache.offices.find(x=>x.id===id); const p=cache.prices.find(x=>x.id===pid);
  if(o){ o.priceId=pid; o.price=p?p.price:null; }
  document.getElementById(`derived-${id}`).textContent = p?.price?p.price.toLocaleString()+'円':'—';
};
window.saveOffices = async function(){
  for(const o of cache.offices) await setDoc(doc(db,'offices',o.id),o);
  showStatus('保存しました');
};

// ===== 稼働日設定 修正版ロジック =====
const MONTHS_LABEL = ["4月","5月","6月","7月","8月","9月","10月","11月","12月","1月","2月","3月"];
const DOW_LABEL = ["日","月","火","水","木","金","土"];

function getFiscalMonths(year){
  return [[year,4],[year,5],[year,6],[year,7],[year,8],[year,9],[year,10],[year,11],[year,12],[year+1,1],[year+1,2],[year+1,3]];
}

function initWdOfficeSelect(){
  const sel = document.getElementById('wd-office');
  sel.innerHTML = cache.offices.map(o=>`<option value="${o.name}">${o.name}</option>`).join('');
}

async function loadWorkdays(){
  const year = parseInt(document.getElementById('wd-year').value);
  const office = document.getElementById('wd-office').value;
  if(!office) return;
  const docId = `${year}_${office}`;
  const snap = await getDoc(doc(db,'workdays',docId));
  wdData = snap.exists() ? snap.data().days : generateDefaultWorkdays(year);
  renderCalendar(year);
}
window.loadWorkdays = loadWorkdays;

function generateDefaultWorkdays(year){
  const data = {};
  getFiscalMonths(year).forEach(([y,m])=>{
    const days = new Date(y,m,0).getDate();
    for(let d=1;d<=days;d++){
      const dow = new Date(y,m-1,d).getDay();
      data[`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`] = dow===0?0:1;
    }
  });
  return data;
}

function renderCalendar(year){
  const cal = document.getElementById('wd-calendar');
  cal.innerHTML = getFiscalMonths(year).map(([y,m],mi)=>{
    const days = new Date(y,m,0).getDate();
    const firstDow = new Date(y,m-1,1).getDay();
    const monthKey = `${y}-${String(m).padStart(2,'0')}`;
    let count = 0;
    let grid = DOW_LABEL.map((d,i)=>`<div class="cal-dow${i===0?' sun':i===6?' sat':''}">${d}</div>`).join('');
    
    // 空白埋め（修正：高さを保持するために empty クラスを使用）
    for(let i=0;i<firstDow;i++) grid+=`<div class="cal-day empty"></div>`;
    
    for(let d=1;d<=days;d++){
      const key = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
      const val = wdData[key]??1;
      const dow = new Date(y,m-1,d).getDay();
      if(val===1) count++;
      let cls = val===1?'on':'off';
      if(val===0 && dow===0) cls+=' sun';
      if(val===0 && dow===6) cls+=' sat';
      grid+=`<button class="cal-day ${cls}" onclick="toggleDay('${key}')">${d}</button>`;
    }
    
    // 最終行の空白埋め（42セル固定にすることでガタつきを防止）
    const totalCells = firstDow + days;
    for(let i=totalCells;i<42;i++) grid+=`<div class="cal-day empty"></div>`;

    return `<div class="cal-month">
      <div class="cal-month-title"><span>${MONTHS_LABEL[mi]}</span><span class="cal-month-count" id="count-${monthKey}">稼働${count}日</span></div>
      <div class="cal-grid">${grid}</div>
    </div>`;
  }).join('');
}

window.toggleDay = function(key){
  wdData[key] = wdData[key]===1?0:1;
  renderCalendar(parseInt(document.getElementById('wd-year').value));
};

window.saveWorkdays = async function(){
  const year = parseInt(document.getElementById('wd-year').value);
  const office = document.getElementById('wd-office').value;
  await setDoc(doc(db,'workdays',`${year}_${office}`),{office, fiscalYear:year, days:wdData, updatedAt:new Date().toISOString()});
  showStatus('保存しました');
};

async function init(){
  await Promise.all([loadTypes(), loadPrices(), loadDepts(), loadAreas(), loadOffices()]);
  renderOfficeTable(); initWdOfficeSelect();
}
init();
</script>
