<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>初期設定 | 貢献人数速報</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#f0f2f5;min-height:100vh;color:#333}
.layout{display:flex;min-height:100vh}
/* サイドバー */
.sidebar{width:200px;background:#1D9E75;flex-shrink:0;padding:0;position:sticky;top:0;height:100vh}
.sidebar-title{padding:20px 16px 16px;color:#fff;font-size:15px;font-weight:600;border-bottom:1px solid rgba(255,255,255,0.2)}
.sidebar-subtitle{font-size:11px;opacity:0.7;font-weight:400;display:block;margin-top:2px}
.nav-item{display:block;padding:12px 16px;color:rgba(255,255,255,0.85);font-size:13px;cursor:pointer;border:none;background:none;width:100%;text-align:left;border-left:3px solid transparent;transition:all 0.15s}
.nav-item:hover{background:rgba(255,255,255,0.1);color:#fff}
.nav-item.active{background:rgba(255,255,255,0.15);color:#fff;border-left-color:#fff;font-weight:500}
.nav-section{padding:12px 16px 4px;font-size:10px;color:rgba(255,255,255,0.5);letter-spacing:0.5px;text-transform:uppercase}
.back-link{display:block;padding:12px 16px;color:rgba(255,255,255,0.6);font-size:12px;cursor:pointer;border:none;background:none;width:100%;text-align:left;margin-top:auto;border-top:1px solid rgba(255,255,255,0.15);position:absolute;bottom:0;width:200px}
.back-link:hover{color:#fff}
/* メインコンテンツ */
.main{flex:1;padding:28px 32px;overflow-y:auto}
.page{display:none}.page.active{display:block}
.page-header{margin-bottom:24px}
.page-title{font-size:20px;font-weight:600;color:#1D9E75;margin-bottom:4px}
.page-desc{font-size:13px;color:#888}
/* カード */
.card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,0.08);margin-bottom:20px;overflow:hidden}
.card-header{padding:14px 20px;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center}
.card-title{font-size:14px;font-weight:600;color:#333}
.card-body{padding:20px}
/* テーブル */
.data-table{width:100%;border-collapse:collapse;font-size:13px}
.data-table th{text-align:left;padding:9px 14px;background:#f8f8f8;color:#666;font-weight:500;border-bottom:1px solid #e8e8e8;white-space:nowrap}
.data-table td{padding:10px 14px;border-bottom:1px solid #f5f5f5;vertical-align:middle}
/* フォーム */
.form-row{display:flex;gap:12px;align-items:flex-end;margin-bottom:12px;flex-wrap:wrap}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-group label{font-size:12px;color:#666;font-weight:500}
.form-group input,.form-group select{padding:8px 10px;border:1px solid #ddd;border-radius:6px;font-size:13px;outline:none}
/* ボタン */
.btn{padding:8px 16px;border-radius:6px;font-size:13px;cursor:pointer;border:none;font-weight:500}
.btn-primary{background:#1D9E75;color:#fff}.btn-primary:hover{background:#0F6E56}
.btn-secondary{background:#f0f0f0;color:#555;border:1px solid #ddd}
.btn-blue{background:#185FA5;color:#fff}
/* ステータスバー */
.status-bar{background:#d4f4e8;color:#0F6E56;font-size:12px;padding:8px 14px;border-radius:6px;margin-bottom:14px;display:none}

/* カレンダー 最終修正版 */
.cal-month {
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    overflow: hidden;
    width: 100%;
    display: flex;
    flex-direction: column;
}
.cal-month-title {
    background: #185FA5;
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    padding: 10px 12px;
    display: flex;
    justify-content: space-between;
}
.cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    /* 隙間を完全になくし、セルの背景色で境界を表現 */
    gap: 0px; 
    padding: 8px;
    background: #fff;
}
.cal-dow {
    font-size: 10px;
    color: #aaa;
    text-align: center;
    padding: 6px 0;
    font-weight: bold;
}
.cal-dow.sun { color: #E24B4A; }
.cal-dow.sat { color: #185FA5; }

.cal-day {
    width: 100%;
    aspect-ratio: 1 / 1;
    border: 1px solid #eee; /* 薄い枠線 */
    margin: 0;
    padding: 0;
    cursor: pointer;
    font-size: 11px;
    font-weight: 600;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.1s;
    background: #fff;
}
.cal-day.on { background: #1D9E75 !important; color: #fff; border-color: #0F6E56; }
.cal-day.off { background: #f9f9f9; color: #ccc; }
.cal-day.off.sun { background: #FFF0E0; color: #CC6600; }
.cal-day.off.sat { background: #EBF3FB; color: #185FA5; }
.cal-day.empty { border: none; cursor: default; pointer-events: none; background: transparent; }
.cal-day:not(.empty):hover { filter: brightness(0.95); z-index: 1; transform: scale(1.05); }

#wd-calendar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-top: 15px;
}
</style>
</head>
<body>
<div class="layout">
    <div class="sidebar">
        <div class="sidebar-title">初期設定<span class="sidebar-subtitle">貢献人数速報</span></div>
        <div class="nav-section">マスタ設定</div>
        <button class="nav-item active" onclick="showPage('service-types',this)">施設種別</button>
        <button class="nav-item" onclick="showPage('prices',this)">単価設定</button>
        <button class="nav-item" onclick="showPage('departments',this)">部署</button>
        <button class="nav-item" onclick="showPage('areas',this)">エリア</button>
        <button class="nav-item" onclick="showPage('offices',this)">事業所登録</button>
        <div class="nav-section">年度設定</div>
        <button class="nav-item" onclick="showPage('workdays',this)">稼働日設定</button>
        <button class="back-link" onclick="location.href='index.html'">← アプリに戻る</button>
    </div>

    <div class="main">
        <div class="status-bar" id="status-bar"></div>
        
        <div class="page active" id="page-service-types">
            <div class="page-header"><div class="page-title">施設種別</div></div>
            <div class="card"><div class="card-body">
                <div class="form-row"><input type="text" id="new-type-name" placeholder="種別名"><button class="btn btn-primary" onclick="addServiceType()">追加</button></div>
                <table class="data-table"><thead><tr><th>種別名</th><th>操作</th></tr></thead><tbody id="type-tbody"></tbody></table>
            </div></div>
        </div>

        <div class="page" id="page-prices">
            <div class="page-header"><div class="page-title">単価設定</div></div>
            <div class="card"><div class="card-body">
                <table class="data-table"><thead><tr><th>施設種別</th><th>定員</th><th>単価</th><th>操作</th></tr></thead><tbody id="price-tbody"></tbody></table>
                <div class="form-row" style="margin-top:20px"><select id="new-price-type"></select><input type="number" id="new-price-capacity" placeholder="定員"><input type="number" id="new-price-value" placeholder="単価"><button class="btn btn-blue" onclick="addPrice()">追加</button></div>
            </div></div>
        </div>

        <div class="page" id="page-offices">
            <div class="page-header"><div class="page-title">事業所登録</div><button class="btn btn-primary" onclick="saveOffices()">保存</button></div>
            <div class="card"><div class="card-body"><table class="data-table"><thead><tr><th>事業所</th><th>部署</th><th>エリア</th><th>単価</th></tr></thead><tbody id="office-tbody"></tbody></table></div></div>
        </div>

        <div class="page" id="page-workdays">
            <div class="page-header"><div class="page-title">稼働日設定</div></div>
            <div class="card" style="padding:20px">
                <div style="display:flex;gap:15px;align-items:flex-end">
                    <select id="wd-year" onchange="loadWorkdays()"><option value="2025">2025年度</option><option value="2026" selected>2026年度</option><option value="2027">2027年度</option></select>
                    <select id="wd-office" style="width:200px" onchange="loadWorkdays()"></select>
                    <button class="btn btn-primary" onclick="saveWorkdays()">保存する</button>
                    <button class="btn btn-secondary" onclick="initWorkdays()">初期値に戻す</button>
                </div>
            </div>
            <div id="wd-calendar"></div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, getDoc, setDoc, addDoc, getDocs, deleteDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
    apiKey: "AIzaSyCl48Fay9AbMLRXJ7npya4PJIgDQPvltxs",
    authDomain: "daily-report-b90e8.firebaseapp.com",
    projectId: "daily-report-b90e8",
    storageBucket: "daily-report-b90e8.firebasestorage.app",
    messagingSenderId: "16569831525",
    appId: "1:16569831525:web:aa250f2061f762dfe1768c"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let cache = {types:[], prices:[], depts:[], areas:[], offices:[]};
let wdData = {};

function showStatus(msg){
    const el = document.getElementById('status-bar');
    el.textContent=msg; el.style.display='block';
    setTimeout(()=>el.style.display='none', 2000);
}

window.showPage = function(id, el){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
    document.getElementById('page-'+id).classList.add('active');
    if(el) el.classList.add('active');
    if(id==='workdays'){ initWdOfficeSelect(); loadWorkdays(); }
};

// マスタ系読み込み
async function loadAll(){
    const t = await getDocs(collection(db,'serviceTypes')); cache.types=[]; t.forEach(d=>cache.types.push({id:d.id,...d.data()}));
    const p = await getDocs(collection(db,'prices')); cache.prices=[]; p.forEach(d=>cache.prices.push({id:d.id,...d.data()}));
    const o = await getDocs(collection(db,'offices')); cache.offices=[]; o.forEach(d=>cache.offices.push({id:d.id,...d.data()}));
    const d = await getDocs(collection(db,'departments')); cache.depts=[]; d.forEach(x=>cache.depts.push({id:x.id,...x.data()}));
    const a = await getDocs(collection(db,'areas')); cache.areas=[]; a.forEach(x=>cache.areas.push({id:x.id,...x.data()}));
}

// カレンダー描画 修正版
function renderCalendar(year){
    const cal = document.getElementById('wd-calendar');
    const months = [[year,4],[year,5],[year,6],[year,7],[year,8],[year,9],[year,10],[year,11],[year,12],[year+1,1],[year+1,2],[year+1,3]];
    const labels = ["4月","5月","6月","7月","8月","9月","10月","11月","12月","1月","2月","3月"];
    
    let html = "";
    months.forEach(([y,m], i)=>{
        const firstDay = new Date(y, m-1, 1).getDay();
        const lastDate = new Date(y, m, 0).getDate();
        const monthKey = `${y}-${String(m).padStart(2,'0')}`;
        
        let count = 0;
        let gridHtml = ["日","月","火","水","木","金","土"].map((d,idx)=>`<div class="cal-dow${idx===0?' sun':idx===6?' sat':''}">${d}</div>`).join('');
        
        // 空白
        for(let j=0; j<firstDay; j++) gridHtml += `<div class="cal-day empty"></div>`;
        
        // 日付
        for(let d=1; d<=lastDate; d++){
            const key = `${monthKey}-${String(d).padStart(2,'0')}`;
            const val = wdData[key] ?? (new Date(y,m-1,d).getDay()===0?0:1);
            if(val===1) count++;
            const dow = new Date(y,m-1,d).getDay();
            let cls = val===1?'on':'off';
            if(val===0 && dow===0) cls+=' sun';
            if(val===0 && dow===6) cls+=' sat';
            gridHtml += `<button class="cal-day ${cls}" onclick="toggleDay('${key}')">${d}</button>`;
        }
        
        // 42セル固定
        const filled = firstDay + lastDate;
        for(let j=filled; j<42; j++) gridHtml += `<div class="cal-day empty"></div>`;

        html += `<div class="cal-month"><div class="cal-month-title"><span>${labels[i]}</span><span>稼働${count}日</span></div><div class="cal-grid">${gridHtml}</div></div>`;
    });
    cal.innerHTML = html;
}

window.toggleDay = (key) => {
    wdData[key] = wdData[key]===1?0:1;
    renderCalendar(parseInt(document.getElementById('wd-year').value));
};

window.loadWorkdays = async () => {
    const y = parseInt(document.getElementById('wd-year').value);
    const o = document.getElementById('wd-office').value;
    if(!o) return;
    const s = await getDoc(doc(db,'workdays',`${y}_${o}`));
    wdData = s.exists() ? s.data().days : {};
    renderCalendar(y);
};

window.saveWorkdays = async () => {
    const y = parseInt(document.getElementById('wd-year').value);
    const o = document.getElementById('wd-office').value;
    await setDoc(doc(db,'workdays',`${y}_${o}`), {office:o, days:wdData});
    showStatus('稼働日を保存しました');
};

function initWdOfficeSelect(){
    document.getElementById('wd-office').innerHTML = cache.offices.map(o=>`<option value="${o.name}">${o.name}</option>`).join('');
}

async function init(){
    await loadAll();
    initWdOfficeSelect();
    loadWorkdays();
}
init();
</script>
</body>
</html>
