<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>初期設定 | 貢献人数速報</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#f0f2f5;min-height:100vh;color:#333}
.layout{display:flex;min-height:100vh}
/* サイドバー */
.sidebar{width:200px;background:#1D9E75;flex-shrink:0;padding:0;position:sticky;top:0;height:100vh}
.sidebar-title{padding:20px 16px 16px;color:#fff;font-size:15px;font-weight:600;border-bottom:1px solid rgba(255,255,255,0.2)}
.sidebar-subtitle{font-size:11px;opacity:0.7;font-weight:400;display:block;margin-top:2px}
.nav-item{display:block;padding:12px 16px;color:rgba(255,255,255,0.85);font-size:13px;cursor:pointer;border:none;background:none;width:100%;text-align:left;border-left:3px solid transparent}
.nav-item.active{background:rgba(255,255,255,0.15);color:#fff;border-left-color:#fff;font-weight:500}
/* メイン */
.main{flex:1;padding:28px 32px;overflow-y:auto}
.page{display:none}.page.active{display:block}
.page-header{margin-bottom:24px}
.page-title{font-size:20px;font-weight:600;color:#1D9E75}
.card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,0.08);margin-bottom:20px;overflow:hidden}
.card-body{padding:20px}
.status-bar{background:#d4f4e8;color:#0F6E56;font-size:12px;padding:8px 14px;border-radius:6px;margin-bottom:14px;display:none}

/* --- カレンダー最終兵器版 --- */
#wd-calendar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-top: 15px;
}
.cal-month {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 8px;
    overflow: hidden;
    width: 100%;
}
.cal-month-title {
    background: #185FA5;
    color: #fff;
    font-size: 12px;
    padding: 10px;
    display: flex;
    justify-content: space-between;
}
.cal-grid-container {
    padding: 8px;
    background: #fff;
}
/* 行単位で管理して隙間を防ぐ */
.cal-row {
    display: flex;
    width: 100%;
}
.cal-dow, .cal-day {
    flex: 0 0 calc(100% / 7); /* 7等分を強制 */
    width: calc(100% / 7);
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    border: 1px solid #eee;
    margin: 0;
    box-sizing: border-box;
}
.cal-dow {
    border: none;
    height: 30px;
    aspect-ratio: auto;
    color: #aaa;
    font-weight: bold;
    font-size: 10px;
}
.cal-dow.sun { color: #E24B4A; }
.cal-dow.sat { color: #185FA5; }

.cal-day {
    cursor: pointer;
    font-weight: 600;
    background: #fff;
}
.cal-day.on { background: #1D9E75 !important; color: #fff; border-color: #0F6E56; }
.cal-day.off { background: #f9f9f9; color: #ccc; }
.cal-day.off.sun { background: #FFF0E0; color: #CC6600; }
.cal-day.off.sat { background: #EBF3FB; color: #185FA5; }
.cal-day.empty { border: none; cursor: default; pointer-events: none; background: transparent; }
.cal-day:not(.empty):hover { filter: brightness(0.9); transform: scale(1.05); z-index: 2; }
</style>
</head>
<body>
<div class="layout">
    <div class="sidebar">
        <div class="sidebar-title">初期設定<span class="sidebar-subtitle">貢献人数速報</span></div>
        <button class="nav-item" onclick="showPage('workdays',this)">稼働日設定</button>
        <button class="back-link" onclick="location.href='index.html'">← アプリに戻る</button>
    </div>

    <div class="main">
        <div class="status-bar" id="status-bar"></div>
        
        <div class="page active" id="page-workdays">
            <div class="page-header"><div class="page-title">稼働日設定</div></div>
            <div class="card" style="padding:20px">
                <div style="display:flex;gap:15px;align-items:flex-end">
                    <select id="wd-year" onchange="loadWorkdays()"><option value="2026" selected>2026年度</option></select>
                    <select id="wd-office" style="width:200px" onchange="loadWorkdays()"></select>
                    <button class="btn btn-primary" onclick="saveWorkdays()" style="background:#1D9E75; color:#fff; padding:8px 16px; border-radius:6px; cursor:pointer; border:none;">保存する</button>
                </div>
            </div>
            <div id="wd-calendar"></div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, doc, getDoc, setDoc, getDocs } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
    apiKey: "AIzaSyCl48Fay9AbMLRXJ7npya4PJIgDQPvltxs",
    authDomain: "daily-report-b90e8.firebaseapp.com",
    projectId: "daily-report-b90e8",
    storageBucket: "daily-report-b90e8.firebasestorage.app",
    messagingSenderId: "16569831525",
    appId: "1:16569831525:web:aa250f2061f762dfe1768c"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let wdData = {};
let officesCache = [];

async function loadOffices() {
    const snap = await getDocs(collection(db, 'offices'));
    officesCache = [];
    snap.forEach(d => officesCache.push({id: d.id, ...d.data()}));
    document.getElementById('wd-office').innerHTML = officesCache.map(o => `<option value="${o.name}">${o.name}</option>`).join('');
}

function renderCalendar(year) {
    const cal = document.getElementById('wd-calendar');
    const months = [[year,4],[year,5],[year,6],[year,7],[year,8],[year,9],[year,10],[year,11],[year,12],[year+1,1],[year+1,2],[year+1,3]];
    const labels = ["4月","5月","6月","7月","8月","9月","10月","11月","12月","1月","2月","3月"];
    
    let html = "";
    months.forEach(([y, m], idx) => {
        const firstDay = new Date(y, m-1, 1).getDay();
        const lastDate = new Date(y, m, 0).getDate();
        const monthKey = `${y}-${String(m).padStart(2,'0')}`;
        
        let dayCells = [];
        // 空白セル
        for (let j=0; j<firstDay; j++) dayCells.push('<div class="cal-day empty"></div>');
        // 日付セル
        for (let d=1; d<=lastDate; d++) {
            const key = `${monthKey}-${String(d).padStart(2,'0')}`;
            const val = wdData[key] ?? (new Date(y,m-1,d).getDay()===0?0:1);
            const dow = new Date(y,m-1,d).getDay();
            let cls = val===1?'on':'off';
            if(val===0 && dow===0) cls+=' sun';
            if(val===0 && dow===6) cls+=' sat';
            dayCells.push(`<div class="cal-day ${cls}" onclick="toggleDay('${key}')">${d}</div>`);
        }
        // 42セルに満たない分を埋める
        while(dayCells.length < 42) dayCells.push('<div class="cal-day empty"></div>');

        // 7つのセルごとに行(cal-row)で包む
        let rowsHtml = "";
        for (let i=0; i<dayCells.length; i+=7) {
            rowsHtml += `<div class="cal-row">${dayCells.slice(i, i+7).join('')}</div>`;
        }

        html += `<div class="cal-month">
            <div class="cal-month-title"><span>${labels[idx]}</span></div>
            <div class="cal-grid-container">
                <div class="cal-row">
                    <div class="cal-dow sun">日</div><div class="cal-dow">月</div><div class="cal-dow">火</div>
                    <div class="cal-dow">水</div><div class="cal-dow">木</div><div class="cal-dow">金</div><div class="cal-dow sat">土</div>
                </div>
                ${rowsHtml}
            </div>
        </div>`;
    });
    cal.innerHTML = html;
}

window.toggleDay = (key) => {
    wdData[key] = wdData[key] === 1 ? 0 : 1;
    renderCalendar(2026);
};

window.loadWorkdays = async () => {
    const o = document.getElementById('wd-office').value;
    const s = await getDoc(doc(db, 'workdays', `2026_${o}`));
    wdData = s.exists() ? s.data().days : {};
    renderCalendar(2026);
};

window.saveWorkdays = async () => {
    const o = document.getElementById('wd-office').value;
    await setDoc(doc(db, 'workdays', `2026_${o}`), {office: o, days: wdData});
    alert('保存しました');
};

async function init() {
    await loadOffices();
    loadWorkdays();
}
init();

window.showPage = (id) => {}; // 簡易化のため
</script>
</body>
</html>
