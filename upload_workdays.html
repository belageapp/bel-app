  const el = document.getElementById(`st-${i}`);
  el.className = `status ${cls}`;
  el.textContent = label;
}

window.uploadAll = async function() {
  const btn = document.getElementById('upload-btn');
  btn.disabled = true;
  btn.textContent = '登録中...';
  document.getElementById('log').innerHTML = '';

  for (let i = 0; i < OFFICES.length; i++) {
    const name = OFFICES[i];
    setSt(i, 'status-wait', '処理中...');
    log(`📤 ${name} を登録中...`);
    try {
      await setDoc(doc(db, 'workdays', `2026_${name}`), {
        days: WORKDAYS[name],
        fiscalYear: 2026,
        office: name,
        updatedAt: new Date().toISOString()
      });
      const cnt = Object.values(WORKDAYS[name]).filter(v=>v===1).length;
      setSt(i, 'status-ok', `✓ 完了 ${cnt}日`);
      log(`✅ ${name}：${cnt}日を登録しました`);
    } catch(err) {
      setSt(i, 'status-err', 'エラー');
      log(`❌ ${name}：エラー - ${err.message}`);
    }
  }

  btn.textContent = '登録完了！';
  log('<br>🎉 全事業所の稼働日登録が完了しました。');
};
</script>
