<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>業務支援システム | 株式会社ベルアージュ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans',sans-serif;background:#f0f2f5;min-height:100vh;color:#333}
.top-bar{background:#fff;padding:0;display:flex;align-items:stretch;border-bottom:1px solid #e0e0e0;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.top-bar-logo{background:#f5f5f5;padding:12px 20px;display:flex;align-items:center;border-right:1px solid #e8e8e8}
.top-bar-logo img{height:38px;object-fit:contain}
.top-bar-divider{width:1px;background:#e0e0e0}
.top-bar-text{padding:0 20px;display:flex;flex-direction:column;justify-content:center}
.top-bar-title{font-size:16px;font-weight:600;color:#1D9E75;letter-spacing:0.3px}
.top-bar-sub{font-size:11px;color:#888;margin-top:1px}
.content{max-width:720px;margin:0 auto;padding:20px 16px}
/* お知らせ */
.notice-card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,0.08);padding:14px 18px;margin-bottom:16px}
.notice-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.notice-title{font-size:13px;font-weight:600;color:#333}
.notice-manage{font-size:11px;color:#185FA5;cursor:pointer;display:none}
.notice-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f5f5f5;font-size:12px}
.notice-item:last-child{border-bottom:none}
.badge-new{background:#fdecea;color:#A32D2D;padding:1px 7px;border-radius:20px;font-size:10px;white-space:nowrap;font-weight:500}
.badge-read{background:#f5f5f5;color:#aaa;padding:1px 7px;border-radius:20px;font-size:10px;white-space:nowrap}
.notice-date{color:#aaa;white-space:nowrap;min-width:40px}
.notice-text{color:#333;flex:1}
.notice-empty{text-align:center;padding:16px;color:#aaa;font-size:12px}
/* メニューグリッド */
.section-label{font-size:11px;color:#888;font-weight:500;margin-bottom:8px;padding-left:2px;letter-spacing:0.5px;text-transform:uppercase}
.menu-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-bottom:10px}
.menu-card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,0.08);padding:14px 16px;cursor:pointer;text-decoration:none;display:block;transition:transform 0.1s,box-shadow 0.1s}
.menu-card:hover{transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,0.12)}
.menu-card:active{transform:scale(0.98)}
.menu-card-inner{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.menu-icon{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.icon-green{background:#d4f4e8}
.icon-blue{background:#ddeef9}
.icon-amber{background:#FEF3C7}
.menu-name{font-size:13px;font-weight:600;color:#333}
.menu-desc{font-size:11px;color:#888;padding-left:44px}
/* 準備中 */
.menu-grid-small{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px}
.menu-card-small{background:#fff;border-radius:8px;padding:10px 12px;text-align:center;opacity:0.55;cursor:default}
.menu-card-small-name{font-size:12px;color:#888;font-weight:500}
.menu-card-small-badge{font-size:10px;color:#bbb;margin-top:2px}
/* 管理者リンク */
.admin-link{text-align:center;padding:8px;font-size:11px;color:#bbb;cursor:pointer}
.admin-link:hover{color:#888}
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-logo">
    <img src="assets/belage_logo.png" alt="ベルアージュ" onerror="this.style.display='none'">
  </div>
  <div class="top-bar-text">
    <div class="top-bar-title">業務支援システム</div>
    <div class="top-bar-sub">株式会社ベルアージュ</div>
  </div>
</div>

<div class="content">

  <!-- お知らせ -->
  <div class="notice-card">
    <div class="notice-header">
      <div class="notice-title">お知らせ</div>
    </div>
    <div id="notice-list"><div class="notice-empty">お知らせはありません</div></div>
  </div>

  <!-- 稼働中メニュー -->
  <div class="section-label">メニュー</div>
  <div class="menu-grid">

    <a href="daily.html" class="menu-card">
      <div class="menu-card-inner">
        <div class="menu-icon icon-green">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#0F6E56" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        </div>
        <div class="menu-name">貢献人数速報</div>
      </div>
      <div class="menu-desc">日次入力・速報確認</div>
    </a>

    <a href="report.html" class="menu-card">
      <div class="menu-card-inner">
        <div class="menu-icon icon-blue">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#185FA5" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        </div>
        <div class="menu-name">貢献実績表</div>
      </div>
      <div class="menu-desc">目標・実績・達成率</div>
    </a>

    <a href="#" class="menu-card" style="opacity:0.5;pointer-events:none;cursor:default">
      <div class="menu-card-inner">
        <div class="menu-icon icon-amber">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#92400E" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </div>
        <div class="menu-name">中期経営計画</div>
      </div>
      <div class="menu-desc">準備中</div>
    </a>

    <a href="settings.html" class="menu-card">
      <div class="menu-card-inner">
        <div class="menu-icon" style="background:#F0EEF8">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#5B4FA0" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg>
        </div>
        <div class="menu-name">マスタ設定</div>
      </div>
      <div class="menu-desc">事業所・単価・稼働日</div>
    </a>

  </div>

  <!-- 準備中メニュー -->
  <div class="section-label">準備中</div>
  <div class="menu-grid-small">
    <div class="menu-card-small"><div class="menu-card-small-name">報酬内容明細</div><div class="menu-card-small-badge">準備中</div></div>
    <div class="menu-card-small"><div class="menu-card-small-name">シフト管理</div><div class="menu-card-small-badge">準備中</div></div>
    <div class="menu-card-small"><div class="menu-card-small-name">採用管理</div><div class="menu-card-small-badge">準備中</div></div>
    <div class="menu-card-small"><div class="menu-card-small-name">社内規程</div><div class="menu-card-small-badge">準備中</div></div>
    <div class="menu-card-small"><div class="menu-card-small-name">各種マニュアル</div><div class="menu-card-small-badge">準備中</div></div>
  </div>



</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, collection, getDocs, query, orderBy, limit } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey:"AIzaSyCl48Fay9AbMLRXJ7npya4PJIgDQPvltxs",
  authDomain:"daily-report-b90e8.firebaseapp.com",
  projectId:"daily-report-b90e8",
  storageBucket:"daily-report-b90e8.firebasestorage.app",
  messagingSenderId:"16569831525",
  appId:"1:16569831525:web:aa250f2061f762dfe1768c"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function loadNotices(){
  try{
    const snap = await getDocs(query(collection(db,'notices'), orderBy('createdAt','desc'), limit(5)));
    if(snap.empty) return;
    const list = document.getElementById('notice-list');
    list.innerHTML = '';
    snap.forEach(d=>{
      const n = d.data();
      const date = n.createdAt?.substring(5,10).replace('-','/') || '';
      const isNew = n.isNew || false;
      list.innerHTML += `<div class="notice-item">
        <span class="${isNew?'badge-new':'badge-read'}">${isNew?'新着':'既読'}</span>
        <span class="notice-date">${date}</span>
        <span class="notice-text">${n.title||''}</span>
      </div>`;
    });
  }catch(e){}
}
loadNotices();
</script>
</body>
</html>
